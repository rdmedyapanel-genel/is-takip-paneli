<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İş Takip Paneli - Hoş Geldiniz</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f9fafb;
            color: #111827;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            text-align: center;
            background: white;
            padding: 3rem;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -4px rgba(0, 0, 0, 0.05);
            max-width: 400px;
            border: 1px solid #e5e7eb;
        }
        h1 {
            color: #0070f3;
            font-size: 1.75rem;
            margin-top: 0;
            margin-bottom: 0.5rem;
        }
        p {
            color: #4b5563;
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 1.5rem;
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background-color: #ecfdf5;
            color: #065f46;
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #10b981;
            border-radius: 50%;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>İş Takip Paneli</h1>
        <p>GitHub ve Vercel bağlantısı başarıyla tamamlandı. Sıfırdan panel kurulumu için ilk adım atıldı!</p>
        <div class="status-badge">
            <span class="status-dot"></span>
            Sistem Canlıda
        </div>
    </div>

</body>
</html>
