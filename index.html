<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RDGRUP - Giriş ve Şube Seçimi</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="stylesheet" href="css/style.css">

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>

<div class="slide-container bg-shape" id="login-screen">
    <div class="full-loader" id="init-loader"><div class="spinner"></div><p style="margin-top: 15px; font-weight: 600; font-size:12px; color: var(--text-muted);">Sistem Hazırlanıyor...</p></div>
    <div class="content-area">
        <h1 style="text-align: center; font-size: 20px; color: var(--primary-red); margin-bottom: 5px; font-weight: 700; letter-spacing: 1px;">RDGRUP İŞ TAKİP PANELİ</h1>
        <h2 class="slide-title" style="margin-top: 0;">Sisteme Giriş</h2>
        <div class="login-card" style="margin-top: 15px;">
            <div class="profile-icon"><i class="fa-solid fa-user-shield"></i></div>
            <div class="input-group"><label>KULLANICI ADI</label><input type="text" id="username" placeholder="Kullanıcı adınızı girin" autocomplete="username"></div>
            <div class="input-group"><label>ŞİFRE</label><input type="password" id="password" placeholder="Şifrenizi girin" autocomplete="current-password"></div>
            <button type="button" class="login-btn" id="login-btn">GİRİŞ YAP</button>
            <div class="forgot-pass-box" id="forgot-password" onclick="alert('Alperen ya da Mete\\'ye ulaşınız lütfen :)')">Şifremi Unuttum</div>
            <p class="error-message" id="error-msg">Hatalı kullanıcı adı veya şifre!</p>
        </div>
    </div>
</div>

<div class="slide-container bg-shape" id="company-selection" style="display: none;">
    <div class="content-area" style="padding-top: 30px;">
        <div style="position: absolute; top: 20px; right: 40px; display: flex; align-items: center; gap: 15px;">
            <div style="text-align: right;">
                <div style="font-weight: 700; color: var(--bg-dark); font-size: 14px;" id="welcome-name">Kullanıcı</div>
                <div style="font-size: 11px; color: var(--text-muted);" id="welcome-role">Rol</div>
            </div>
            <button type="button" class="action-btn" onclick="logout()" style="color: var(--primary-red); background: #fee2e2; padding: 8px 12px; border-radius: 8px;"><i class="fa-solid fa-power-off"></i> Çıkış</button>
        </div>

        <h2 class="slide-title" style="margin-top: 0; font-size: 36px;">ŞUBE SEÇİMİ</h2>
        <p class="slide-subtitle">Planlı çalışmak başarıyı getirir! Kolay gelsin :)</p>
        
        <div style="display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; margin-top: 15px;">
            <button type="button" class="login-btn" style="width: auto; padding: 12px 30px; background: var(--bg-dark); font-size: 14px; border-radius: 12px;" onclick="window.location.href='tum_isler/index.html'"><i class="fa-solid fa-layer-group" style="margin-right: 8px;"></i> TÜM İŞLER (Genel Bakış)</button>
        </div>
        
        <div class="company-grid">
            <div class="company-card" onclick="window.location.href='medya/index.html'"><i class="fa-solid fa-clapperboard"></i><h3>RDGRUP MEDYA</h3></div>
            <div class="company-card" onclick="window.location.href='ankara-mezuniyet/index.html'"><i class="fa-solid fa-graduation-cap"></i><h3>ANKARA MEZUNİYET</h3></div>
            <div class="company-card" onclick="window.location.href='turkiye-mezuniyet/index.html'"><i class="fa-solid fa-earth-americas"></i><h3>TÜRKİYE MEZUNİYET</h3></div>
        </div>
        
        <div id="admin-section" style="display: none; text-align: center; margin-top: 15px;">
            <hr style="border: 0; border-top: 2px dashed #e2e8f0; margin-bottom: 10px;">
            <div class="company-card admin-panel-card" onclick="window.location.href='admin/index.html'"><i class="fa-solid fa-user-shield"></i><h3>Yönetim Paneli (Admin)</h3></div>
        </div>
    </div>
</div>

<script src="js/firebase-config.js"></script>

<script>
    let dbUsers = [];
    
    // Sayfa yüklendiğinde kullanıcıları çek ve önceden giriş yapılmış mı kontrol et
    async function init() {
        document.getElementById('init-loader').style.display = 'flex';
        try {
            const snapshot = await db.collection('users').get();
            snapshot.forEach(doc => { dbUsers.push({ docId: doc.id, ...doc.data() }); });
            
            checkExistingLogin();
        } catch(e) {
            console.error("Veritabanı hatası", e);
        } finally {
            document.getElementById('init-loader').style.display = 'none';
        }
    }

    function checkExistingLogin() {
        const savedUser = localStorage.getItem('rdgrup_user');
        if (savedUser) {
            const user = JSON.parse(savedUser);
            showCompanySelection(user);
        }
    }

    document.getElementById('login-btn').addEventListener('click', () => {
        const userId = document.getElementById('username').value.trim().toLowerCase();
        const userPass = document.getElementById('password').value.trim();
        const foundUser = dbUsers.find(u => (u.id || "").toLowerCase() === userId && u.pass === userPass);

        if (foundUser) {
            // Kullanıcıyı tarayıcı hafızasına kaydet (Diğer sayfalarda da girişli kalsın)
            localStorage.setItem('rdgrup_user', JSON.stringify(foundUser));
            document.getElementById('error-msg').style.display = 'none';
            showCompanySelection(foundUser);
        } else {
            document.getElementById('error-msg').style.display = 'block';
        }
    });

    document.getElementById('password').addEventListener('keypress', (e) => { 
        if (e.key === 'Enter') document.getElementById('login-btn').click(); 
    });

    function showCompanySelection(user) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('company-selection').style.display = 'flex';
        
        document.getElementById('welcome-name').innerText = user.name + " " + (user.surname || "");
        document.getElementById('welcome-role').innerText = user.role || "Bilinmiyor";

        const role = (user.role || "").toLowerCase();
        const isAdmin = role === 'admin' || user.id === 'alperen';
        document.getElementById('admin-section').style.display = isAdmin ? 'block' : 'none'; 
    }

    function logout() {
        localStorage.removeItem('rdgrup_user');
        document.getElementById('company-selection').style.display = 'none';
        document.getElementById('login-screen').style.display = 'flex';
        document.getElementById('username').value = '';
        document.getElementById('password').value = '';
    }

    window.onload = init;
</script>
</body>
</html>
