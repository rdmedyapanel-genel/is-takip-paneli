<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holding İş Takip Paneli - Tasarım Prototipi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* 1. KURULUM VE ANA DEĞİŞKENLER */
        :root {
            --primary-red: #dc2626; /* Canlı Kurumsal Kırmızı */
            --dark-red: #7f1d1d;
            --bg-dark: #0f172a;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        /* Tüm sistem fontu Poppins yapıldı */
        body {
            background-color: #f1f5f9;
            display: grid;
            gap: 40px;
            grid-template-columns: 1fr;
            place-items: center;
            padding: 40px 0;
            font-family: 'Poppins', sans-serif; 
        }

        .slide-container {
            width: 1280px;
            height: 720px;
            background-color: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .slide-container::before {
            content: '';
            position: absolute;
            top: -200px;
            right: -200px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(220, 38, 38, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
        }

        /* Başlıklar ortalandı ve sol çizgi kaldırıldı */
        .slide-title {
            font-size: 36px;
            font-weight: 700;
            color: var(--bg-dark);
            text-align: center;
            margin: 50px 60px 10px 60px;
            position: relative;
            z-index: 1;
        }

        .content-area {
            flex-grow: 1;
            padding: 20px 60px 60px 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        /* 4. GİRİŞ EKRANI TASARIMI */
        .login-card {
            width: 400px;
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            margin: 0 auto;
            text-align: center;
            border: 1px solid #e2e8f0;
        }

        .profile-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--primary-red), var(--dark-red));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            color: white;
            font-size: 48px;
            box-shadow: 0 10px 20px rgba(220, 38, 38, 0.3);
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-muted);
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #f1f5f9;
            border-radius: 12px;
            background: #f8fafc;
            transition: all 0.3s;
            font-family: 'Poppins', sans-serif;
        }

        .input-group input:focus {
            border-color: var(--primary-red);
            outline: none;
            background: white;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary-red);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            letter-spacing: 1px;
            margin-top: 10px;
        }
        
        .error-message {
            color: var(--primary-red);
            font-size: 14px;
            margin-top: 15px;
            display: none;
            font-weight: 600;
        }

        /* 5. FİRMA SEÇİMİ TASARIMI */
        .company-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            width: 100%;
        }

        .company-card {
            background: #ffffff;
            border: 2px solid #f1f5f9;
            border-radius: 24px;
            padding: 50px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .company-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary-red);
            box-shadow: 0 20px 40px rgba(220, 38, 38, 0.1);
        }

        .company-card i {
            font-size: 64px;
            color: var(--primary-red);
            margin-bottom: 25px;
        }

        .company-card h3 {
            font-size: 28px;
            color: var(--bg-dark);
            margin-bottom: 15px;
        }

        .company-card p {
            color: var(--text-muted);
            font-size: 16px;
        }

        /* 6. HAZIRLANIYOR EKRANI */
        .loading-state {
            text-align: center;
        }

        .loading-spinner {
            width: 80px;
            height: 80px;
            border: 8px solid #f1f5f9;
            border-top: 8px solid var(--primary-red);
            border-radius: 50%;
            margin: 0 auto 30px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="slide-container" id="login-screen">
    <h2 class="slide-title">Sisteme Giriş</h2>
    <div class="content-area">
        <div class="login-card">
            <div class="profile-icon">
                <i class="fa-solid fa-user-shield"></i>
            </div>
            <div class="input-group">
                <label>KULLANICI ADI</label>
                <input type="text" id="username" placeholder="Kullanıcı adınızı girin">
            </div>
            <div class="input-group">
                <label>ŞİFRE</label>
                <input type="password" id="password" placeholder="Şifrenizi girin">
            </div>
            <button class="login-btn" id="login-btn">GİRİŞ YAP</button>
            <p class="error-message" id="error-msg">Hatalı kullanıcı adı veya şifre!</p>
        </div>
    </div>
</div>

<div class="slide-container" id="company-selection" style="display: none;">
    <h2 class="slide-title">Lütfen Çalışmak İstediğiniz Firmayı Seçin</h2>
    <div class="content-area">
        <div class="company-grid">
            <div class="company-card" onclick="showLoading('RDGRUP MEDYA')">
                <i class="fa-solid fa-clapperboard"></i>
                <h3>RDGRUP MEDYA</h3>
                <p>Medya Planlama, Prodüksiyon ve İçerik Yönetimi</p>
            </div>
            <div class="company-card" onclick="showLoading('ANKARA MEZUNİYET')">
                <i class="fa-solid fa-graduation-cap"></i>
                <h3>ANKARA MEZUNİYET</h3>
                <p>Etkinlik Yönetimi, Mezuniyet Organizasyonları</p>
            </div>
        </div>
    </div>
</div>

<div class="slide-container" id="loading-screen" style="display: none;">
    <h2 class="slide-title" id="loading-title">Panel Hazırlanıyor</h2>
    <div class="content-area">
        <div class="loading-state">
            <div class="loading-spinner"></div>
            <h3 style="font-size: 36px; color: var(--bg-dark);">Modül Hazırlanıyor...</h3>
            <p style="font-size: 18px; color: var(--text-muted); margin-top: 10px;">Veritabanı senkronizasyonu yapılıyor.</p>
            <div style="margin-top: 40px; background: #f1f5f9; height: 8px; border-radius: 4px; width: 400px; margin-left: auto; margin-right: auto;">
                <div style="background: var(--primary-red); height: 100%; width: 65%; border-radius: 4px;"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const loginBtn = document.getElementById('login-btn');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const errorMsg = document.getElementById('error-msg');
    
    const loginScreen = document.getElementById('login-screen');
    const companyScreen = document.getElementById('company-selection');
    const loadingScreen = document.getElementById('loading-screen');
    const loadingTitle = document.getElementById('loading-title');

    // Giriş Kontrol Mantığı
    loginBtn.addEventListener('click', () => {
        const user = usernameInput.value.trim();
        const pass = passwordInput.value.trim();

        // Şifre ve kullanıcı adı doğrulaması
        if (user === 'alperen' && pass === '123') {
            errorMsg.style.display = 'none';
            loginScreen.style.display = 'none';
            companyScreen.style.display = 'flex';
        } else {
            errorMsg.style.display = 'block';
        }
    });

    // Enter tuşu ile giriş yapabilme özelliği eklendi
    passwordInput.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            loginBtn.click();
        }
    });

    function showLoading(companyName) {
        companyScreen.style.display = 'none';
        loadingScreen.style.display = 'flex';
        loadingTitle.innerText = companyName + ' - Panel';
    }
</script>

</body>
</html>
