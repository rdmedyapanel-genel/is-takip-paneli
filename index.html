<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holding İş Takip Paneli</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* --- 1. ANA DEĞİŞKENLER VE KURULUM --- */
        :root {
            --primary-red: #dc2626;
            --dark-red: #7f1d1d;
            --bg-dark: #0f172a;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --bg-light: #f8fafc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #e2e8f0;
            display: grid;
            place-items: center;
            height: 100vh;
            font-family: 'Poppins', sans-serif; 
        }

        /* Ana Çerçeve Sabit Boyut */
        .slide-container {
            width: 1366px;
            height: 768px;
            background-color: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Arka Plan Süsü (Sadece Giriş ve Seçim ekranlarında aktif) */
        .bg-shape::before {
            content: '';
            position: absolute;
            top: -200px;
            right: -200px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(220, 38, 38, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
            pointer-events: none;
        }

        .slide-title {
            font-size: 32px;
            font-weight: 700;
            color: var(--bg-dark);
            text-align: center;
            margin: 40px 60px 10px 60px;
            position: relative;
            z-index: 1;
        }

        .content-area {
            flex-grow: 1;
            padding: 20px 60px 40px 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        /* --- 2. GİRİŞ EKRANI BİLEŞENLERİ --- */
        .login-card {
            width: 400px;
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            margin: 0 auto;
            text-align: center;
            border: 1px solid #e2e8f0;
        }

        .profile-icon {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, var(--primary-red), var(--dark-red));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            color: white;
            font-size: 40px;
            box-shadow: 0 10px 20px rgba(220, 38, 38, 0.3);
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-muted);
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #f1f5f9;
            border-radius: 12px;
            background: var(--bg-light);
            transition: all 0.3s;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
        }

        .input-group input:focus {
            border-color: var(--primary-red);
            outline: none;
            background: white;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary-red);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            letter-spacing: 1px;
            margin-top: 10px;
            transition: background-color 0.2s;
        }
        
        .login-btn:hover { background-color: var(--dark-red); }

        /* Yeni Şifremi Unuttum Kutusu */
        .forgot-pass-box {
            background-color: #f1f5f9;
            color: var(--text-muted);
            padding: 12px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            margin-top: 15px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #e2e8f0;
        }

        .forgot-pass-box:hover {
            background-color: #e2e8f0;
            color: var(--text-main);
        }

        .error-message {
            color: var(--primary-red);
            font-size: 14px;
            margin-top: 15px;
            display: none;
            font-weight: 600;
        }

        /* --- 3. FİRMA SEÇİMİ EKRANI --- */
        .company-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 firmaya göre güncellendi */
            gap: 30px;
            width: 100%;
        }

        .company-card {
            background: #ffffff;
            border: 2px solid #f1f5f9;
            border-radius: 24px;
            padding: 40px 20px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .company-card:hover {
            transform: translateY(-8px);
            border-color: var(--primary-red);
            box-shadow: 0 20px 40px rgba(220, 38, 38, 0.1);
        }

        .company-card i {
            font-size: 50px;
            color: var(--primary-red);
            margin-bottom: 20px;
        }

        .company-card h3 {
            font-size: 22px;
            color: var(--bg-dark);
        }

        .admin-panel-card {
            border-color: var(--bg-dark);
            padding: 15px 30px;
            display: inline-block;
            margin-top: 20px;
            width: auto;
        }
        
        .admin-panel-card i { color: var(--bg-dark); font-size: 24px; margin-bottom: 5px; }
        .admin-panel-card h3 { font-size: 16px; }

        /* --- 4. YÜKLENİYOR ANİMASYONU --- */
        .loading-spinner {
            width: 70px;
            height: 70px;
            border: 6px solid #f1f5f9;
            border-top: 6px solid var(--primary-red);
            border-radius: 50%;
            margin: 0 auto 30px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- 5. DASHBOARD (PANEL) ARAYÜZÜ --- */
        .dashboard-layout {
            display: flex;
            width: 100%;
            height: 100%;
            background: var(--bg-light);
        }

        /* Sol Menü (Sidebar) */
        .sidebar {
            width: 280px;
            background: white;
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            padding: 25px 20px;
        }

        /* Profil Alanı */
        .sidebar-profile {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: var(--bg-light);
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .sidebar-profile:hover {
            border-color: #cbd5e1;
            background: white;
        }

        .sidebar-profile .avatar {
            width: 45px;
            height: 45px;
            background: var(--primary-red);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        /* Firma Ekranına Dön Butonu */
        .back-to-company {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            margin-top: 15px;
            margin-bottom: 25px;
            border-radius: 10px;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 600;
            background: white;
            border: 1px solid #e2e8f0;
            cursor: pointer;
            transition: 0.2s;
        }

        .back-to-company:hover {
            background: #f1f5f9;
            color: var(--primary-red);
            border-color: #cbd5e1;
        }

        /* Menü Listesi */
        .menu-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 5px;
            overflow-y: auto;
        }

        .menu-item {
            padding: 12px 15px;
            border-radius: 10px;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .menu-item i { font-size: 18px; width: 24px; text-align: center; }
        
        .menu-item:hover, .menu-item.active {
            background: #fee2e2;
            color: var(--primary-red);
        }

        /* Ana İçerik Alanı (Sağ Taraf) */
        .main-panel {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .content-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
            max-width: 800px;
        }

        .content-title {
            font-size: 24px;
            color: var(--bg-dark);
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid #e2e8f0;
        }

    </style>
</head>
<body>

<div class="slide-container bg-shape" id="login-screen">
    <h2 class="slide-title">Sisteme Giriş</h2>
    <div class="content-area">
        <div class="login-card">
            <div class="profile-icon">
                <i class="fa-solid fa-user-shield"></i>
            </div>
            <div class="input-group">
                <label>KULLANICI ADI</label>
                <input type="text" id="username" placeholder="Kullanıcı adınızı girin">
            </div>
            <div class="input-group">
                <label>ŞİFRE</label>
                <input type="password" id="password" placeholder="Şifrenizi girin">
            </div>
            
            <button class="login-btn" id="login-btn">GİRİŞ YAP</button>
            
            <div class="forgot-pass-box" id="forgot-password">
                Şifremi Unuttum
            </div>
            
            <p class="error-message" id="error-msg">Hatalı kullanıcı adı veya şifre!</p>
        </div>
    </div>
</div>

<div class="slide-container bg-shape" id="company-selection" style="display: none;">
    <h2 class="slide-title">FİRMA SEÇİNİZ</h2>
    <div class="content-area">
        <div class="company-grid">
            <div class="company-card" onclick="startLoading('RDGRUP MEDYA', 'rdgrup')">
                <i class="fa-solid fa-clapperboard"></i>
                <h3>RDGRUP MEDYA</h3>
            </div>
            <div class="company-card" onclick="startLoading('ANKARA MEZUNİYET', 'mezuniyet')">
                <i class="fa-solid fa-graduation-cap"></i>
                <h3>ANKARA MEZUNİYET</h3>
            </div>
            <div class="company-card" onclick="startLoading('TÜRKİYE MEZUNİYET', 'mezuniyet')">
                <i class="fa-solid fa-earth-americas"></i>
                <h3>TÜRKİYE MEZUNİYET</h3>
            </div>
        </div>

        <div id="admin-section" style="display: none; text-align: center; margin-top: 10px;">
            <hr style="border: 0; border-top: 2px dashed #e2e8f0; margin-bottom: 10px;">
            <div class="company-card admin-panel-card" onclick="startLoading('YÖNETİM PANELİ', 'admin')">
                <i class="fa-solid fa-user-shield"></i>
                <h3>Yönetim Paneli (Admin)</h3>
            </div>
        </div>
    </div>
</div>

<div class="slide-container" id="loading-screen" style="display: none;">
    <h2 class="slide-title" id="loading-title">Panel Hazırlanıyor</h2>
    <div class="content-area">
        <div class="loading-state" style="text-align: center;">
            <div class="loading-spinner"></div>
            <h3 style="font-size: 32px; color: var(--bg-dark);">Modül Hazırlanıyor...</h3>
            <p style="font-size: 16px; color: var(--text-muted); margin-top: 10px;">Lütfen bekleyiniz, veriler yükleniyor.</p>
        </div>
    </div>
</div>

<div class="slide-container" id="dashboard-screen" style="display: none;">
    <div class="dashboard-layout">
        
        <div class="sidebar">
            <div class="sidebar-profile" onclick="loadProfileView()">
                <div class="avatar"><i class="fa-solid fa-user"></i></div>
                <div>
                    <div style="font-weight: 700; color: var(--bg-dark); font-size: 15px;">Alperen</div>
                    <div style="font-size: 12px; color: var(--text-muted);">Admin</div>
                </div>
            </div>

            <button class="back-to-company" onclick="backToCompanySelection()">
                <i class="fa-solid fa-arrow-left"></i> Firma Ekranına Dön
            </button>
            
            <div style="font-size: 11px; font-weight: 700; color:#94a3b8; margin-bottom: 10px; letter-spacing: 1px;">MENÜ MENÜSÜ</div>
            <ul class="menu-list" id="sidebar-menu">
                </ul>
        </div>

        <div class="main-panel" id="main-content">
            </div>

    </div>
</div>

<script>
    // -- ELEMENTLER --
    const loginBtn = document.getElementById('login-btn');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const errorMsg = document.getElementById('error-msg');
    const forgotPassBtn = document.getElementById('forgot-password');
    
    const loginScreen = document.getElementById('login-screen');
    const companyScreen = document.getElementById('company-selection');
    const loadingScreen = document.getElementById('loading-screen');
    const dashboardScreen = document.getElementById('dashboard-screen');
    
    const adminSection = document.getElementById('admin-section');
    const loadingTitle = document.getElementById('loading-title');
    const sidebarMenu = document.getElementById('sidebar-menu');
    const mainContent = document.getElementById('main-content');

    let currentCompany = "";

    // -- FİRMA MENÜ LİSTELERİ --
    const menuData = {
        'rdgrup': [
            { icon: 'fa-house', name: 'Anasayfa' },
            { icon: 'fa-clipboard-user', name: 'Kendi İşlerim' },
            { icon: 'fa-calendar-days', name: 'Genel Takvim' },
            { icon: 'fa-users', name: 'Paylaşım Takvimi' },
            { icon: 'fa-camera', name: 'Çekim Takvimi' },
            { icon: 'fa-building', name: 'Firmalar' },
            { icon: 'fa-list-check', name: 'Checklist' },
            { icon: 'fa-book', name: 'Genel Ajanda' },
            { icon: 'fa-book-open', name: 'Kişisel Ajanda' },
            { icon: 'fa-chart-pie', name: 'Raporlar' },
            { icon: 'fa-bullhorn', name: 'Reklamlar' }
        ],
        'mezuniyet': [
            { icon: 'fa-house', name: 'Anasayfa' },
            { icon: 'fa-camera-retro', name: 'Çekimler' },
            { icon: 'fa-calendar-days', name: 'Genel Takvim' },
            { icon: 'fa-camera', name: 'Çekim Takvimi' },
            { icon: 'fa-list-check', name: 'Checklist' },
            { icon: 'fa-book', name: 'Genel Ajanda' },
            { icon: 'fa-book-open', name: 'Kişisel Ajanda' }
        ]
    };

    // -- GİRİŞ İŞLEMLERİ --
    forgotPassBtn.addEventListener('click', () => {
        alert("Alperen ya da Mete'ye ulaşınız lütfen :)");
    });

    loginBtn.addEventListener('click', () => {
        const user = usernameInput.value.trim().toLowerCase();
        const pass = passwordInput.value.trim();

        if (user === 'alperen' && pass === '123') {
            errorMsg.style.display = 'none';
            loginScreen.style.display = 'none';
            companyScreen.style.display = 'flex';
            adminSection.style.display = 'block'; 
        } else {
            errorMsg.style.display = 'block';
        }
    });

    passwordInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') loginBtn.click();
    });

    // -- GEÇİŞ VE YÜKLEME --
    function startLoading(companyName, type) {
        currentCompany = companyName;
        companyScreen.style.display = 'none';
        loadingScreen.style.display = 'flex';
        loadingTitle.innerText = companyName;

        // 1.5 saniye sonra paneli aç
        setTimeout(() => {
            loadingScreen.style.display = 'none';
            openDashboard(companyName, type);
        }, 1500);
    }

    function backToCompanySelection() {
        dashboardScreen.style.display = 'none';
        companyScreen.style.display = 'flex';
    }

    // -- DASHBOARD İŞLEMLERİ --
    function openDashboard(companyName, type) {
        dashboardScreen.style.display = 'flex';
        sidebarMenu.innerHTML = ''; // Menüyü temizle

        // Seçilen firmaya göre menüyü oluştur (rdgrup veya mezuniyet)
        const items = menuData[type] || menuData['rdgrup'];

        items.forEach((item, index) => {
            const li = document.createElement('li');
            li.className = index === 0 ? 'menu-item active' : 'menu-item';
            li.innerHTML = `<i class="fa-solid ${item.icon}"></i> ${item.name}`;
            
            li.onclick = () => {
                // Aktif class'ı değiştir
                document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
                li.classList.add('active');
                // Sayfayı yükle
                loadPageView(item.name);
            };
            sidebarMenu.appendChild(li);
        });

        // Varsayılan olarak Anasayfa açılsın
        loadPageView('Anasayfa');
    }

    function loadPageView(pageName) {
        mainContent.innerHTML = `
            <div class="content-card" style="max-width: 100%;">
                <h2 class="content-title">${currentCompany} - ${pageName}</h2>
                <p style="color: var(--text-muted); line-height: 1.6;">
                    Bu alan <b>${pageName}</b> sayfası için ayrılmıştır. 
                    Veritabanı bağlantısı kurulduğunda tablolar, takvimler ve görev panoları burada listelenecektir.
                </p>
            </div>
        `;
    }

    // -- PROFİL SAYFASI İŞLEMLERİ --
    function loadProfileView() {
        // Menüdeki aktifliği kaldır
        document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));

        mainContent.innerHTML = `
            <div class="content-card">
                <h2 class="content-title">Profil Bilgileri</h2>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px;">
                    <div class="input-group">
                        <label>İSİM</label>
                        <input type="text" value="Alperen" disabled style="background: #f1f5f9; cursor: not-allowed;">
                    </div>
                    <div class="input-group">
                        <label>SOYİSİM</label>
                        <input type="text" value="Yılmaz" disabled style="background: #f1f5f9; cursor: not-allowed;">
                    </div>
                </div>

                <h3 style="font-size: 18px; margin-bottom: 20px; color: var(--bg-dark);">Şifre Değiştir</h3>
                
                <div class="input-group" style="max-width: 350px;">
                    <label>GÜNCEL ŞİFRE</label>
                    <input type="password" placeholder="Mevcut şifrenizi girin">
                </div>
                <div class="input-group" style="max-width: 350px;">
                    <label>YENİ ŞİFRE</label>
                    <input type="password" placeholder="Yeni şifrenizi belirleyin">
                </div>
                
                <button class="login-btn" style="width: auto; padding: 12px 30px;" onclick="alert('Şifre değiştirme simülasyonu çalıştı!')">Şifreyi Güncelle</button>
            </div>
        `;
    }
</script>

</body>
</html>
