<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RDGRUP MEDYA - İş Takip Paneli</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/tr.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <link rel="stylesheet" href="../css/style.css">
    <style>
        /* YENİ MODERN REKLAM TABLOSU TASARIMI */
        .reklam-table { width: 100%; border-collapse: separate; border-spacing: 0; min-width: 1300px; font-size: 12px; }
        .reklam-table th { background: #f8fafc; color: #64748b; padding: 14px 8px; text-align: center; border-bottom: 2px solid #e2e8f0; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
        .reklam-table td { padding: 10px 6px; border-bottom: 1px solid #f1f5f9; text-align: center; background: white; transition: background 0.2s; }
        .reklam-table tr:hover td { background: #f8fafc; }
        
        .reklam-input { width: 100%; min-width: 65px; padding: 8px; font-size: 12px; text-align: center; border: 1px solid #e2e8f0; border-radius: 6px; font-family: 'Poppins', sans-serif; background: #ffffff; color: #1e293b; font-weight: 500; transition: all 0.2s; }
        .reklam-input:focus { border-color: var(--task-purple); outline: none; box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.1); }
        .reklam-readonly { background: transparent; font-weight: 700; color: var(--primary-red); border-color: transparent; font-size: 13px;}
    </style>
</head>
<body>

<div class="modal-overlay" id="task-modal">
    <div class="modal-content">
        <i class="fa-solid fa-xmark modal-close" onclick="closeModal('task-modal')"></i>
        <h3 class="modal-title" id="task-modal-title">Paylaşım Görevi Ekle</h3>
        <input type="hidden" id="task-doc-id" value="">
        <input type="hidden" id="task-category" value="rdgrup_paylasim">
        <div class="input-group"><label>Firma:</label><select id="t-firma"><option value="">Firmalar Yükleniyor...</option></select></div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <div class="input-group"><label>İçerik Türü:</label><select id="t-tur"><option value="Video">Video</option><option value="Tasarım">Tasarım</option><option value="Fotoğraf">Fotoğraf</option></select></div>
            <div class="input-group"><label>Adet:</label><input type="number" id="t-adet" value="1" min="1" autocomplete="off"></div>
        </div>
        <div class="input-group"><label>Hazırlayacak Kişi:</label><select id="t-hazirlayan"></select></div>
        <div class="input-group"><label>Paylaşacak Kişi:</label><select id="t-paylasan"></select></div>
        <div class="input-group"><label>Tarih:</label><input type="text" id="t-tarih" placeholder="Tarih(ler) seçin..." autocomplete="off"></div>
        <div class="input-group"><label>Not:</label><textarea id="t-not" rows="2" placeholder="Görev ile ilgili ek notlar..." autocomplete="off"></textarea></div>
        <div class="checkbox-group" id="t-status-group" style="display: none;"><label><input type="checkbox" id="t-hazirlandi"> Hazırlandı</label><label><input type="checkbox" id="t-paylasildi"> Paylaşıldı</label></div>
        <div style="display: flex; gap: 10px; margin-top: 15px;" id="task-buttons">
            <button type="button" class="login-btn btn-purple" id="save-task-btn" style="flex: 1;" onclick="saveTask()">Kaydet</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="shoot-modal">
    <div class="modal-content">
        <i class="fa-solid fa-xmark modal-close" onclick="closeModal('shoot-modal')"></i>
        <h3 class="modal-title" id="shoot-modal-title">Çekim Ekle</h3>
        <input type="hidden" id="sh-doc-id" value="">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <div class="input-group"><label>Firma Seç:</label><select id="sh-firma"><option value="">Firmalar Yükleniyor...</option></select></div>
            <div class="input-group"><label>Tarih:</label><input type="text" id="sh-tarih" placeholder="Tarih seçin..." autocomplete="off"></div>
            <div class="input-group" style="grid-column: span 2;"><label>Saat:</label><input type="time" id="sh-saat" style="font-family: 'Poppins';" autocomplete="off"></div>
        </div>
        <div class="input-group"><label>Çekimi Yapanlar (Birden fazla seçilebilir):</label><div class="multi-checkbox-list" id="sh-kisi-list"></div></div>
        <div class="input-group"><label>Çekim Notu:</label><textarea id="sh-not" rows="2" placeholder="Mekan, konsept vb. detaylar..." autocomplete="off"></textarea></div>
        
        <div id="shoot-extra-fields" style="display: none;">
            <h4 style="font-size: 13px; color: var(--bg-dark); margin: 15px 0 10px; border-bottom: 1px solid #e2e8f0; padding-bottom: 5px;">Yedek ve Teslimat Süreci</h4>
            <div class="checkbox-group">
                <label><input type="checkbox" id="sh-cekildi"> Çekim yapıldı</label><label><input type="checkbox" id="sh-teslim"> Yedek Teslim Edildi</label>
                <label><input type="checkbox" id="sh-hdd"> Yedek HDD'ye Alındı</label><label><input type="checkbox" id="sh-drive"> Yedek Drive'a Alındı</label>
            </div>
            <div class="input-group" style="margin-top: 10px;">
                <label>Yedek Linki:</label><div style="display: flex; gap: 10px;"><input type="text" id="sh-link" placeholder="Drive, WeTransfer vb. link" style="flex: 1;" autocomplete="off"><button type="button" class="login-btn btn-light" style="width: auto; padding: 10px 15px;" onclick="goToShootLink()" title="Linke Git"><i class="fa-solid fa-arrow-up-right-from-square"></i></button></div>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px;">
                <div class="input-group"><label>Toplam Boyut:</label><input type="text" id="sh-boyut" placeholder="Örn: 45 GB" autocomplete="off"></div>
                <div class="input-group"><label>Foto Sayısı:</label><input type="number" id="sh-foto" value="0" min="0" autocomplete="off"></div>
                <div class="input-group"><label>Video Sayısı:</label><input type="number" id="sh-video" value="0" min="0" autocomplete="off"></div>
            </div>
        </div>
        <div style="display: flex; gap: 10px; margin-top: 15px;" id="shoot-buttons"><button type="button" class="login-btn btn-orange" id="save-shoot-btn" style="flex: 1;" onclick="saveShoot()">Kaydet</button></div>
    </div>
</div>

<div class="modal-overlay" id="ga-modal">
    <div class="modal-content">
        <i class="fa-solid fa-xmark modal-close" onclick="closeModal('ga-modal')"></i>
        <h3 class="modal-title" id="ga-modal-title">Genel Ajanda - Görev Ekle</h3>
        <input type="hidden" id="ga-doc-id" value="new">
        <input type="hidden" id="ga-status" value="0">
        <div class="input-group"><label>GÖREV BAŞLIĞI</label><input type="text" id="ga-title" placeholder="Ateşbey Gayrimenkul, Festival vs." autocomplete="off"></div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <div class="input-group"><label>FİRMA SEÇ</label><select id="ga-firma"></select></div>
            <div class="input-group"><label>TESLİM TARİHİ</label><input type="text" id="ga-tarih" placeholder="Tarih seçin..." autocomplete="off"></div>
            <div class="input-group"><label>SORUMLU KİŞİ</label><select id="ga-sorumlu"></select></div>
            <div class="input-group"><label>EKLEYEN</label><input type="text" id="ga-ekleyen" disabled></div>
            <div class="input-group"><label>VİDEO SAYISI</label><input type="number" id="ga-video" value="0" min="0" autocomplete="off"></div>
            <div class="input-group"><label>TASARIM SAYISI</label><input type="number" id="ga-tasarim" value="0" min="0" autocomplete="off"></div>
        </div>
        <div class="input-group">
            <label>NOT İÇERİĞİ</label>
            <div class="rt-toolbar">
                <button type="button" class="rt-btn" onclick="execCmd('bold')" title="Kalın"><b>B</b></button>
                <button type="button" class="rt-btn" onclick="execCmd('italic')" title="İtalik"><i>I</i></button>
                <button type="button" class="rt-btn" onclick="execCmd('insertUnorderedList')" title="Madde İşareti"><i class="fa-solid fa-list-ul"></i></button>
                <button type="button" class="rt-btn" onclick="insertCheckbox()" title="Checkbox Ekle"><i class="fa-regular fa-square-check"></i></button>
            </div>
            <div id="ga-not" class="rt-editor" contenteditable="true" placeholder="Notları buraya yazınız..."></div>
        </div>
        <div style="display: flex; gap: 10px; margin-top: 15px;" id="ga-buttons"><button type="button" class="login-btn btn-purple" id="save-ga-btn" style="flex: 1;" onclick="saveGenelAgenda()">Ekle</button></div>
    </div>
</div>

<div class="modal-overlay" id="company-note-modal">
    <div class="modal-content" style="width: 500px;">
        <i class="fa-solid fa-xmark modal-close" onclick="closeModal('company-note-modal')"></i>
        <h3 class="modal-title" id="comp-note-title">Firma Notu</h3>
        <input type="hidden" id="comp-note-doc-id" value="">
        <textarea id="comp-note-text" class="chk-textarea" placeholder="Bu firma ile ilgili önemli notlar, briefler veya stratejiler..." style="min-height: 150px;" autocomplete="off"></textarea>
        <div style="display: flex; gap: 10px; margin-top: 15px;">
            <button type="button" class="login-btn btn-gray" style="flex: 1;" onclick="closeModal('company-note-modal')">Kapat</button>
            <button type="button" class="login-btn btn-purple" id="save-comp-note-btn" style="flex: 1;" onclick="saveCompanyNote()">Notu Kaydet</button>
        </div>
    </div>
</div>

<div class="slide-container" id="dashboard-screen" style="display: flex;"> <div class="dashboard-layout">
        <div class="sidebar" id="app-sidebar">
            <div id="sidebar-top-bar" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <div class="sidebar-profile" onclick="loadProfileView()">
                    <div class="avatar" id="logged-avatar">A</div>
                    <div class="profile-texts">
                        <div style="font-weight: 700; color: var(--bg-dark); font-size: 14px;" id="logged-user-name">Kullanıcı</div>
                        <div style="font-size: 11px; color: var(--text-muted);" id="logged-user-role">Rol</div>
                    </div>
                </div>
                <button type="button" class="action-btn" id="sidebar-toggle-btn" onclick="toggleSidebar()" style="padding: 8px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0; margin-left: 5px;"><i class="fa-solid fa-bars"></i></button>
            </div>
            
            <button type="button" class="back-to-company" onclick="backToCompanySelection()"><i class="fa-solid fa-arrow-left"></i> <span>Şube Seçimine Dön</span></button>
            <div class="menu-category" style="font-size: 10px; font-weight: 700; color:#94a3b8; margin-bottom: 8px; letter-spacing: 1px;">MENÜ</div>
            <ul class="menu-list" id="sidebar-menu"></ul>
            <button type="button" class="logout-item" onclick="logout()"><i class="fa-solid fa-power-off"></i> <span>Çıkış Yap</span></button>
        </div>
        
        <div class="main-panel" id="main-content">
            <div class="full-loader" id="init-loader" style="display: flex; background: transparent;"><div class="spinner"></div><p style="margin-top: 15px; font-weight: 600; font-size:12px; color: var(--text-muted);">Sistem Yükleniyor...</p></div>
        </div>
    </div>
</div>

<script src="../js/firebase-config.js"></script>

<script>
    let dbUsers = []; let dbTasks = []; let dbShoots = []; let dbAgenda = []; let dbCompanies = []; let dbGenelAgenda = []; let dbPersonalAgenda = []; let dbAds = [];
    let currentUser = null; let currentCompany = "RDGRUP MEDYA"; 
    let activePage = ""; let showArchivedGA = false; let reportDate = new Date(); let reklamDate = new Date();
    let taskDatePicker, shootDatePicker, chkDatePicker, gaDatePicker;
    let calDate = new Date(); let currentCalView = 'month'; let currentChecklistDate = formatDate(new Date()); let isSidebarCollapsed = false;

    const normalizeStr = (str) => (str || "").replace(/\s+/g, '').toLowerCase();

    function formatDate(dateObj) {
        let d = new Date(dateObj), month = '' + (d.getMonth() + 1), day = '' + d.getDate(), year = d.getFullYear();
        if (month.length < 2) month = '0' + month; if (day.length < 2) day = '0' + day;
        return [year, month, day].join('-');
    }

    function formatDateTR(dateString) { if(!dateString) return ""; return new Date(dateString).toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', year: 'numeric' }); }
    function calculateDaysPassed(dateString) { if (!dateString) return null; const targetDate = new Date(dateString); const today = new Date(); targetDate.setHours(0,0,0,0); today.setHours(0,0,0,0); const diffTime = today - targetDate; const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24)); return diffDays >= 0 ? diffDays : 0; }

    window.onload = async function() {
        const savedUser = localStorage.getItem('rdgrup_user');
        if (!savedUser) { window.location.href = '../index.html'; return; }
        currentUser = JSON.parse(savedUser);
        document.getElementById('logged-user-name').innerText = currentUser.name || "Kullanıcı"; document.getElementById('logged-user-role').innerText = currentUser.role || "Bilinmiyor"; document.getElementById('logged-avatar').innerText = (currentUser.name || "?").charAt(0).toUpperCase();
        await initializeSystem();
    };

    async function initializeSystem() {
        try {
            await fetchCompaniesFromFirebase(); await fetchUsersFromFirebase(); await fetchTasksFromFirebase(); await fetchShootsFromFirebase(); await fetchAgendaFromFirebase(); await fetchGenelAgendaFromFirebase(); await fetchAdsFromFirebase();
            loadSidebarMenu();
        } catch (error) { 
            console.error("Bağlantı hatası: ", error); 
        } finally {
            // YÜKLEME EKRANI BURADA KAPANIR
            document.getElementById('init-loader').style.display = 'none';
        }
    }

    function logout() { localStorage.removeItem('rdgrup_user'); window.location.href = '../index.html'; }
    function backToCompanySelection() { window.location.href = '../index.html'; }
    function toggleSidebar() { isSidebarCollapsed = !isSidebarCollapsed; const sb = document.getElementById('app-sidebar'); if (isSidebarCollapsed) { sb.classList.add('collapsed'); } else { sb.classList.remove('collapsed'); } }
    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    async function fetchUsersFromFirebase() { const snapshot = await db.collection('users').get(); dbUsers = []; snapshot.forEach(doc => { dbUsers.push({ docId: doc.id, ...doc.data() }); }); dbUsers.sort((a, b) => (a.order || 0) - (b.order || 0)); populateUserDropdowns(); }
    async function fetchCompaniesFromFirebase() { const snapshot = await db.collection('companies').get(); dbCompanies = []; snapshot.forEach(doc => { dbCompanies.push({ docId: doc.id, ...doc.data() }); }); dbCompanies.sort((a, b) => (a.order || 0) - (b.order || 0)); populateCompanyDropdown(); }
    async function fetchTasksFromFirebase() { const snapshot = await db.collection('tasks').get(); dbTasks = []; snapshot.forEach(doc => { dbTasks.push({ docId: doc.id, ...doc.data() }); }); }
    async function fetchShootsFromFirebase() { const snapshot = await db.collection('shoots').get(); dbShoots = []; snapshot.forEach(doc => { dbShoots.push({ docId: doc.id, ...doc.data() }); }); }
    async function fetchAgendaFromFirebase() { const snapshot = await db.collection('agenda').get(); dbAgenda = []; snapshot.forEach(doc => { dbAgenda.push({ docId: doc.id, ...doc.data() }); }); }
    async function fetchGenelAgendaFromFirebase() { const snapshot = await db.collection('genel_agenda').get(); dbGenelAgenda = []; snapshot.forEach(doc => { dbGenelAgenda.push({ docId: doc.id, ...doc.data() }); }); }
    async function fetchPersonalAgendaFromFirebase() { if(!currentUser) return; const snapshot = await db.collection('personal_agenda').where('userId', '==', currentUser.id).get(); dbPersonalAgenda = []; snapshot.forEach(doc => { dbPersonalAgenda.push({ docId: doc.id, ...doc.data() }); }); }
    async function fetchAdsFromFirebase() { const snapshot = await db.collection('ads_data').get(); dbAds = []; snapshot.forEach(doc => { dbAds.push({ docId: doc.id, ...doc.data() }); }); }

    function populateUserDropdowns() {
        const hSelect = document.getElementById('t-hazirlayan'), pSelect = document.getElementById('t-paylasan'); const sSelect = document.getElementById('sh-kisi-list'), gaSelect = document.getElementById('ga-sorumlu');
        if(hSelect) hSelect.innerHTML = ''; if(pSelect) pSelect.innerHTML = ''; if(sSelect) sSelect.innerHTML = ''; if(gaSelect) gaSelect.innerHTML = '';
        dbUsers.forEach(u => {
            const safeName = u.name || "İsimsiz"; const safeSurname = u.surname || ""; let n = `${safeName} ${safeSurname}`.trim();
            if(hSelect) hSelect.add(new Option(n, safeName)); if(pSelect) pSelect.add(new Option(n, safeName)); if(gaSelect) gaSelect.add(new Option(n, safeName));
            if(sSelect) sSelect.innerHTML += `<label><input type="checkbox" value="${safeName}" class="sh-kisi-cb"> <span>${n}</span></label>`;
        });
    }

    function populateCompanyDropdown() {
        const fSelect = document.getElementById('t-firma'), shSelect = document.getElementById('sh-firma'), gaSelect = document.getElementById('ga-firma');
        if(fSelect) fSelect.innerHTML = ''; if(shSelect) shSelect.innerHTML = ''; if(gaSelect) gaSelect.innerHTML = '';
        if(dbCompanies.length === 0) { let opt = new Option("Firma bulunamadı", ""); if(fSelect) fSelect.add(opt); if(shSelect) shSelect.add(opt); if(gaSelect) gaSelect.add(opt); } 
        else { dbCompanies.forEach(c => { const cName = c.name || "İsimsiz"; if(fSelect) fSelect.add(new Option(cName, cName)); if(shSelect) shSelect.add(new Option(cName, cName)); if(gaSelect) gaSelect.add(new Option(cName, cName)); }); }
    }

    function loadSidebarMenu() {
        const sidebarMenu = document.getElementById('sidebar-menu'); sidebarMenu.innerHTML = ''; 
        const items = [
            { icon: 'fa-house', name: 'Anasayfa' }, { icon: 'fa-clipboard-user', name: 'Kendi İşlerim' },
            { icon: 'fa-calendar-days', name: 'Genel Takvim' }, { icon: 'fa-users', name: 'Paylaşım Takvimi' },
            { icon: 'fa-camera', name: 'Çekim Takvimi' }, { icon: 'fa-building', name: 'Firmalar' },
            { icon: 'fa-list-check', name: 'Checklist' }, { icon: 'fa-book', name: 'Genel Ajanda' },
            { icon: 'fa-book-open', name: 'Kişisel Ajanda' }, 
            { icon: 'fa-bullhorn', name: 'Reklamlar' },
            { icon: 'fa-chart-bar', name: 'Raporlar' }
        ];

        const role = (currentUser.role || "").toLowerCase(); const isAdminOrYonetici = role === 'admin' || role === 'yönetici' || currentUser.id === 'alperen';

        items.forEach((item) => {
            if ((item.name === 'Raporlar' || item.name === 'Reklamlar') && !isAdminOrYonetici) return; 
            const li = document.createElement('li'); li.className = 'menu-item';
            if (sidebarMenu.children.length === 0) li.classList.add('active'); 
            li.innerHTML = `<i class="fa-solid ${item.icon}"></i> <span>${item.name}</span>`;
            li.onclick = () => { document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active')); li.classList.add('active'); loadPageView(item.name); };
            sidebarMenu.appendChild(li);
        });
        loadPageView(items[0].name);
    }

    function loadPageView(pageName) {
        activePage = pageName; const mainContent = document.getElementById('main-content');
        if (pageName === 'Raporlar') { reportDate = new Date(); loadRaporlarPage(); }
        else if (pageName === 'Reklamlar') { reklamDate = new Date(); loadReklamlarPage(); } 
        else if (pageName === 'Firmalar') loadFirmalarPage();
        else if (pageName === 'Checklist') loadChecklistPage(currentChecklistDate);
        else if (pageName === 'Genel Ajanda') loadGenelAgenda();
        else if (pageName === 'Kişisel Ajanda') loadPersonalAgenda();
        else if (pageName === 'Anasayfa' || pageName === 'Kendi İşlerim') mainContent.innerHTML = renderDashboardHome(pageName);
        else if (pageName.includes('Takvim')) { mainContent.innerHTML = renderCalendarView(pageName); initCalendar(); }
    }

    // --- REKLAMLAR SAYFASI ---
    function loadReklamlarPage() {
        let y = reklamDate.getFullYear(); let m = reklamDate.getMonth() + 1; 
        let monthStr = `${y}-${m < 10 ? '0'+m : m}`; 
        let displayMonth = reklamDate.toLocaleDateString('tr-TR', { month: 'long', year: 'numeric' });

        let targetComps = dbCompanies.filter(c => c.showInAds === true);

        let html = `
            <div class="content-card" style="padding: 20px; overflow-x: auto;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;"><h2 class="content-title" style="margin-bottom: 0; border: none; padding:0;">${currentCompany} - Reklam Yönetimi</h2></div>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; background: #f8fafc; padding: 10px 15px; border-radius: 10px; border: 1px solid #e2e8f0;">
                    <div style="display: flex; gap: 8px; align-items: center;">
                        <button type="button" class="action-btn" onclick="changeReklamMonth(-1)"><i class="fa-solid fa-chevron-left"></i></button>
                        <button type="button" class="action-btn" onclick="changeReklamMonth(1)"><i class="fa-solid fa-chevron-right"></i></button>
                        <button type="button" class="login-btn btn-light" style="width: auto; padding: 5px 12px; font-size: 11px; margin:0;" onclick="reklamDate = new Date(); loadReklamlarPage();">Bu Ay</button>
                    </div>
                    <h3 style="font-size: 16px; color: var(--bg-dark); font-weight: 700; margin: 0; text-transform:uppercase;">${displayMonth}</h3>
                    <div style="width: 100px;"></div>
                </div>
        `;

        if (targetComps.length === 0) {
            html += `<div style="text-align:center; color:var(--text-muted); padding:30px;">Reklam sayfasında görünecek firma bulunamadı. Lütfen Admin panelinden firmaları düzenleyip onaylayın.</div></div>`;
            document.getElementById('main-content').innerHTML = html;
            return;
        }

        html += `
            <table class="reklam-table">
                <thead>
                    <tr>
                        <th style="min-width: 160px; text-align: left;"><i class="fa-solid fa-building" style="margin-right:6px; color:var(--text-muted);"></i> Firma Adı</th>
                        <th>Tamamlanan<br>Reklam (Adet)</th>
                        <th>Tamamlanan<br>Bütçe (₺)</th>
                        <th style="background:#eff6ff; color:#1d4ed8; border-bottom: 2px solid #bfdbfe;">Bütçe + KDV (₺)</th>
                        <th>Aktif R. 1</th>
                        <th>Aktif R. 2</th>
                        <th>Aktif R. 3</th>
                        <th>Aktif R. 4</th>
                        <th>Aktif R. 5</th>

    function changeReklamMonth(direction) { reklamDate.setMonth(reklamDate.getMonth() + direction); loadReklamlarPage(); }

    function calcReklam(docId) {
        let compBudg = parseFloat(document.getElementById(`r_compBudg_${docId}`).value) || 0;
        let compKdv = compBudg * 1.20;
        document.getElementById(`r_compKdv_${docId}`).value = compKdv.toFixed(2);

        let a1 = parseFloat(document.getElementById(`r_act1_${docId}`).value) || 0;
        let a2 = parseFloat(document.getElementById(`r_act2_${docId}`).value) || 0;
        let a3 = parseFloat(document.getElementById(`r_act3_${docId}`).value) || 0;
        let a4 = parseFloat(document.getElementById(`r_act4_${docId}`).value) || 0;
        let a5 = parseFloat(document.getElementById(`r_act5_${docId}`).value) || 0;
        
        let actTotalKdv = (a1 + a2 + a3 + a4 + a5) * 1.20;
        document.getElementById(`r_actTotalKdv_${docId}`).value = actTotalKdv.toFixed(2);

        let totalSpent = compKdv + actTotalKdv;
        document.getElementById(`r_totalSpent_${docId}`).value = totalSpent.toFixed(2);

        let totalBudg = parseFloat(document.getElementById(`r_totalBudg_${docId}`).value) || 0;
        let remaining = totalBudg - totalSpent;
        document.getElementById(`r_remaining_${docId}`).value = remaining.toFixed(2);
    }

    async function toggleTaskStatus(docId, type) { const t = dbTasks.find(x => x.docId === docId); if(!t) return; let updateData = {}; updateData[type] = !t[type]; t[type] = !t[type]; initCalendar(); await db.collection('tasks').doc(docId).update(updateData); await fetchTasksFromFirebase(); }
    async function deleteTask(docId) { if(confirm("Görevi silmek istediğinize emin misiniz?")) { await db.collection('tasks').doc(docId).delete(); closeModal('task-modal'); await fetchTasksFromFirebase(); loadPageView(activePage); } }

    function openAddShoot() { document.getElementById('shoot-modal-title').innerText = "Çekim Ekle"; document.getElementById('sh-doc-id').value = "new"; document.getElementById('sh-firma').value = ""; document.getElementById('sh-not').value = ""; document.getElementById('sh-link').value = ""; document.getElementById('sh-boyut').value = ""; document.getElementById('sh-foto').value = "0"; document.getElementById('sh-video').value = "0"; document.getElementById('sh-cekildi').checked = false; document.getElementById('sh-teslim').checked = false; document.getElementById('sh-hdd').checked = false; document.getElementById('sh-drive').checked = false; document.querySelectorAll('.sh-kisi-cb').forEach(cb => cb.checked = false); if(shootDatePicker) shootDatePicker.destroy(); shootDatePicker = flatpickr("#sh-tarih", { dateFormat: "Y-m-d", locale: "tr", defaultDate: new Date(), altInput: true, altFormat: "j F Y" }); document.getElementById('sh-saat').value = ""; document.getElementById('shoot-extra-fields').style.display = 'none'; document.getElementById('shoot-buttons').innerHTML = `<button type="button" class="login-btn btn-gray" style="flex: 1;" onclick="closeModal('shoot-modal')">Kapat</button><button type="button" class="login-btn btn-orange" id="save-shoot-btn" style="flex: 1;" onclick="saveShoot()">Kaydet</button>`; openModal('shoot-modal'); }
    function openEditShoot(docId) { const s = dbShoots.find(x => x.docId === docId); if(!s) return; document.getElementById('shoot-modal-title').innerText = "Çekim Kartı (Düzenle)"; document.getElementById('sh-doc-id').value = docId; document.getElementById('sh-firma').value = s.firma || ""; document.getElementById('sh-not').value = s.not || ""; document.getElementById('sh-link').value = s.link || ""; document.getElementById('sh-boyut').value = s.boyut || ""; document.getElementById('sh-foto').value = s.foto || 0; document.getElementById('sh-video').value = s.video || 0; document.getElementById('sh-cekildi').checked = s.cekildi; document.getElementById('sh-teslim').checked = s.teslim; document.getElementById('sh-hdd').checked = s.hdd; document.getElementById('sh-drive').checked = s.drive; let kisiArray = Array.isArray(s.kisi) ? s.kisi : [s.kisi]; document.querySelectorAll('.sh-kisi-cb').forEach(cb => { cb.checked = kisiArray.includes(cb.value); }); if(shootDatePicker) shootDatePicker.destroy(); shootDatePicker = flatpickr("#sh-tarih", { dateFormat: "Y-m-d", locale: "tr", defaultDate: s.tarih, altInput: true, altFormat: "j F Y" }); document.getElementById('sh-saat').value = s.saat || ""; document.getElementById('shoot-extra-fields').style.display = 'block'; document.getElementById('shoot-buttons').innerHTML = `<button type="button" class="login-btn btn-orange" id="save-shoot-btn" style="flex: 1;" onclick="saveShoot()">Kaydet</button><button type="button" class="login-btn" style="flex: 1; background: var(--primary-red);" onclick="deleteShoot('${docId}')">Sil</button><button type="button" class="login-btn btn-gray" style="flex: 1;" onclick="closeModal('shoot-modal')">Kapat</button>`; openModal('shoot-modal'); }
    async function saveShoot() { const docId = document.getElementById('sh-doc-id').value; const btn = document.getElementById('save-shoot-btn'); btn.innerText = "Kaydediliyor..."; try { let selectedKisiler = []; document.querySelectorAll('.sh-kisi-cb:checked').forEach(cb => { selectedKisiler.push(cb.value); }); let t_date = shootDatePicker.selectedDates.length > 0 ? formatDate(shootDatePicker.selectedDates[0]) : formatDate(new Date()); const shootData = { holding: currentCompany, firma: document.getElementById('sh-firma').value || "", kisi: selectedKisiler, tarih: t_date, saat: document.getElementById('sh-saat').value, not: document.getElementById('sh-not').value, link: document.getElementById('sh-link').value, boyut: document.getElementById('sh-boyut').value, foto: parseInt(document.getElementById('sh-foto').value) || 0, video: parseInt(document.getElementById('sh-video').value) || 0, cekildi: document.getElementById('sh-cekildi').checked, teslim: document.getElementById('sh-teslim').checked, hdd: document.getElementById('sh-hdd').checked, drive: document.getElementById('sh-drive').checked }; if(docId === "new") await db.collection('shoots').add(shootData); else await db.collection('shoots').doc(docId).update(shootData); closeModal('shoot-modal'); await fetchShootsFromFirebase(); loadPageView(activePage); } catch (error) { console.error("Çekim Kayıt Hatası:", error); alert("Çekim kaydedilemedi."); btn.innerText = "Kaydet"; } }
    async function deleteShoot(docId) { if(confirm("Çekimi silmek istediğinize emin misiniz?")) { await db.collection('shoots').doc(docId).delete(); closeModal('shoot-modal'); await fetchShootsFromFirebase(); loadPageView(activePage); } }
    function goToShootLink() { const link = document.getElementById('sh-link').value.trim(); if(link) window.open(link.startsWith('http') ? link : 'https://' + link, '_blank'); else alert('Lütfen geçerli bir link girin.'); }
    function loadProfileView() { document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active')); document.getElementById('main-content').innerHTML = `<div class="content-card" style="max-width: 600px;"><h2 class="content-title">Profil Bilgileri</h2><div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px;"><div class="input-group"><label>İSİM</label><input type="text" value="${currentUser.name || ""}" disabled></div><div class="input-group"><label>SOYİSİM</label><input type="text" value="${currentUser.surname || ""}" disabled></div></div><h3 style="font-size: 15px; margin-bottom: 15px; color: var(--bg-dark);">Şifre Değiştir</h3><div class="input-group"><label>YENİ ŞİFRE</label><input type="password" id="new-profile-pass" autocomplete="new-password"></div><button type="button" class="login-btn" onclick="updateOwnPassword()">Şifreyi Güncelle</button></div>`; }
    async function updateOwnPassword() { const newPass = document.getElementById('new-profile-pass').value; if(newPass) { currentUser.pass = newPass; await db.collection('users').doc(currentUser.docId).update({ pass: newPass }); await fetchUsersFromFirebase(); alert('Şifreniz güncellendi!'); } }
// --- KİŞİSEL AJANDA FONKSİYONLARI ---
    async function loadPersonalAgenda() {
        await fetchPersonalAgendaFromFirebase();
        let html = `
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 class="content-title" style="margin-bottom: 0; border: none; padding:0;">Kişisel Ajanda</h2>
            </div>
            <div class="checklist-info-bar" style="border-color:#f59e0b; background:#fffdf5; color:#b45309;">
                <i class="fa-solid fa-lock"></i> Bu alana eklediğiniz notlar sadece sizin tarafınızdan görülür.
            </div>
            <div class="content-card" style="margin-bottom:20px;">
                <textarea id="pa-new-note" class="chk-textarea" placeholder="Yeni bir özel not ekleyin..." style="min-height:80px;" autocomplete="off"></textarea>
                <div style="text-align:right;">
                    <button type="button" class="login-btn btn-orange" style="width:auto; padding:6px 15px;" onclick="addPersonalNote()">Notu Kaydet</button>
                </div>
            </div><div>
        `;
        dbPersonalAgenda.sort((a,b) => b.timestamp - a.timestamp).forEach(p => {
            html += `
                <div class="pa-note-card">
                    <div>
                        <div class="pa-content">${p.note}</div>
                        <div class="pa-date">${formatDateTR(p.dateStr)}</div>
                    </div>
                    <button type="button" class="action-btn" onclick="deletePersonalNote('${p.docId}')">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                </div>`;
        });
        html += `</div>`; 
        document.getElementById('main-content').innerHTML = html;
    }
    
    async function addPersonalNote() { 
        const text = document.getElementById('pa-new-note').value.trim(); 
        if(!text) return; 
        await db.collection('personal_agenda').add({ userId: currentUser.id, note: text, timestamp: Date.now(), dateStr: formatDate(new Date()) }); 
        loadPersonalAgenda(); 
    }
    
    async function deletePersonalNote(docId) { 
        if(confirm("Notu silmek istiyor musunuz?")) { 
            await db.collection('personal_agenda').doc(docId).delete(); 
            loadPersonalAgenda(); 
        } 
    }

    // --- GENEL AJANDA FONKSİYONLARI (TÜMÜ EKSİKSİZ) ---
    async function loadGenelAgenda() {
        await fetchGenelAgendaFromFirebase();
        let html = `
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 class="content-title" style="margin-bottom: 0; border: none; padding:0;">Genel Ajanda</h2>
                <button type="button" class="login-btn btn-light" style="width: auto; padding: 6px 15px; font-size:12px; margin:0;" onclick="toggleArchiveGA()">
                    <i class="fa-solid fa-box-archive"></i> <span>${showArchivedGA ? 'Aktif Görevleri Göster' : 'Arşivi Göster'}</span>
                </button>
            </div>
            <div class="checklist-info-bar" style="border-color:var(--task-purple); background:#f5f3ff; color:#5b21b6;">
                <i class="fa-solid fa-circle-info"></i> Bu sayfa tüm ekibe açıktır. Eklenen görevleri ve notları herkes görebilir.
            </div>
            <div class="ga-grid">
                ${!showArchivedGA ? `<div class="ga-card add-card" onclick="openAddGenelAgenda()"><i class="fa-solid fa-plus"></i></div>` : ''}
        `;

        let visibleAgenda = dbGenelAgenda.filter(g => showArchivedGA ? g.isArchived : !g.isArchived);
        visibleAgenda.sort((a,b) => new Date(a.tarih) - new Date(b.tarih));

        visibleAgenda.forEach(g => {
            let badgeHtml = '';
            if(g.video > 0) badgeHtml += `<div class="ga-badge video">${g.video} Video</div>`;
            if(g.tasarim > 0) badgeHtml += `<div class="ga-badge tasarim">${g.tasarim} Tasarım</div>`;
            
            let previewText = (g.not || "").replace(/<[^>]*>?/gm, '');
            const isCompleted = g.status === 3;
            const cardClass = isCompleted ? 'ga-card completed-ga' : 'ga-card';

            html += `
                <div class="${cardClass}">
                    <div class="ga-header">
                        <div class="ga-title">${g.title || ""}</div>
                        <div class="ga-badges">${badgeHtml}</div>
                    </div>
                    <div class="ga-date"><i class="fa-regular fa-calendar" style="margin-right:4px;"></i> Teslim: ${formatDateTR(g.tarih)}</div>
                    <div class="ga-company"><i class="fa-solid fa-building"></i> ${g.firma || ""}</div>
                    <div class="ga-preview">"${previewText || 'Not eklenmemiş...'}"</div>
                    <button type="button" class="ga-view-btn" onclick="openEditGenelAgenda('${g.docId}')">
                        <i class="fa-solid fa-magnifying-glass"></i> İçeriği ve Görevleri Gör
                    </button>
                    <div class="ga-footer-info">
                        <span>Ekleyen: <b>${g.ekleyen || ""}</b></span>
                        <span>Sorumlu: <b>${g.sorumlu || ""}</b></span>
                    </div>
                    ${!showArchivedGA ? `
                    <div class="ga-status-btns">
                        <button type="button" class="ga-s-btn ${g.status >= 1 ? 'active-1' : ''}" onclick="updateGAStatus('${g.docId}', 1)">Görüldü</button>
                        <button type="button" class="ga-s-btn ${g.status >= 2 ? 'active-2' : ''}" onclick="updateGAStatus('${g.docId}', 2)">Hazırlanıyor</button>
                        <button type="button" class="ga-s-btn ${isCompleted ? 'active-3' : ''}" onclick="updateGAStatus('${g.docId}', 3)">Tamamlandı</button>
                    </div>
                    ` : ''}
                    <button type="button" class="ga-archive-btn" onclick="toggleArchiveStatusGA('${g.docId}')">
                        <i class="fa-solid ${showArchivedGA ? 'fa-box-open' : 'fa-box-archive'}"></i> ${showArchivedGA ? 'Arşivden Çıkar' : 'Arşivle'}
                    </button>
                </div>
            `;
        });
        html += `</div>`; document.getElementById('main-content').innerHTML = html;
    }

    function toggleArchiveGA() { showArchivedGA = !showArchivedGA; loadGenelAgenda(); }
    async function updateGAStatus(docId, newStatus) { await db.collection('genel_agenda').doc(docId).update({ status: newStatus }); loadGenelAgenda(); }
    async function toggleArchiveStatusGA(docId) { let g = dbGenelAgenda.find(x => x.docId === docId); if(!g) return; await db.collection('genel_agenda').doc(docId).update({ isArchived: !g.isArchived }); loadGenelAgenda(); }
    function execCmd(command) { document.execCommand(command, false, null); } 
    function insertCheckbox() { document.execCommand('insertHTML', false, '&#8203;<input type="checkbox">&#8203; '); }
    
    // --- İŞTE EKSİK OLAN FONKSİYONLAR BURASI ---
    function openAddGenelAgenda() { 
        document.getElementById('ga-modal-title').innerText = "Genel Ajanda - Görev Ekle"; 
        document.getElementById('ga-doc-id').value = "new"; 
        document.getElementById('ga-status').value = 0; 
        document.getElementById('ga-title').value = ""; 
        document.getElementById('ga-video').value = 0; 
        document.getElementById('ga-tasarim').value = 0; 
        document.getElementById('ga-not').innerHTML = ""; 
        document.getElementById('ga-ekleyen').value = currentUser.name; 
        if(gaDatePicker) gaDatePicker.destroy(); 
        gaDatePicker = flatpickr("#ga-tarih", { dateFormat: "Y-m-d", locale: "tr", defaultDate: new Date(), altInput: true, altFormat: "j F Y" }); 
        document.getElementById('ga-buttons').innerHTML = `<button type="button" class="login-btn btn-gray" style="flex: 1;" onclick="closeModal('ga-modal')">Kapat</button><button type="button" class="login-btn btn-purple" style="flex: 1;" onclick="saveGenelAgenda()">Ekle</button>`; 
        openModal('ga-modal'); 
    }
    
    function openEditGenelAgenda(docId) { 
        let g = dbGenelAgenda.find(x => x.docId === docId); 
        if(!g) return; 
        document.getElementById('ga-modal-title').innerText = "Genel Ajanda - Düzenle"; 
        document.getElementById('ga-doc-id').value = docId; 
        document.getElementById('ga-status').value = g.status || 0; 
        document.getElementById('ga-title').value = g.title || ""; 
        document.getElementById('ga-firma').value = g.firma || ""; 
        document.getElementById('ga-sorumlu').value = g.sorumlu || ""; 
        document.getElementById('ga-video').value = g.video || 0; 
        document.getElementById('ga-tasarim').value = g.tasarim || 0; 
        document.getElementById('ga-ekleyen').value = g.ekleyen || ""; 
        document.getElementById('ga-not').innerHTML = g.not || ""; 
        if(gaDatePicker) gaDatePicker.destroy(); 
        gaDatePicker = flatpickr("#ga-tarih", { dateFormat: "Y-m-d", locale: "tr", defaultDate: g.tarih, altInput: true, altFormat: "j F Y" }); 
        document.getElementById('ga-buttons').innerHTML = `<button type="button" class="login-btn btn-purple" style="flex: 1;" onclick="saveGenelAgenda()">Kaydet</button><button type="button" class="login-btn" style="flex: 1; background: var(--primary-red);" onclick="deleteGenelAgenda('${docId}')">Sil</button><button type="button" class="login-btn btn-gray" style="flex: 1;" onclick="closeModal('ga-modal')">Kapat</button>`; 
        openModal('ga-modal'); 
    }
    
    async function saveGenelAgenda() { 
        const docId = document.getElementById('ga-doc-id').value; 
        const data = { 
            holding: currentCompany, 
            title: document.getElementById('ga-title').value, 
            firma: document.getElementById('ga-firma').value, 
            tarih: document.getElementById('ga-tarih').value, 
            sorumlu: document.getElementById('ga-sorumlu').value, 
            video: parseInt(document.getElementById('ga-video').value) || 0, 
            tasarim: parseInt(document.getElementById('ga-tasarim').value) || 0, 
            not: document.getElementById('ga-not').innerHTML, 
            ekleyen: document.getElementById('ga-ekleyen').value, 
            isArchived: false, 
            status: parseInt(document.getElementById('ga-status').value) || 0 
        }; 
        try { 
            if(docId === "new") await db.collection('genel_agenda').add(data); 
            else { delete data.isArchived; await db.collection('genel_agenda').doc(docId).update(data); } 
            closeModal('ga-modal'); loadGenelAgenda(); 
        } catch (error) { 
            console.error("Kayıt hatası:", error); alert("Kaydedilirken bir hata oluştu."); 
        } 
    }
    
    async function deleteGenelAgenda(docId) { 
        if(confirm("Bu kartı silmek istediğinize emin misiniz?")) { 
            await db.collection('genel_agenda').doc(docId).delete(); 
            closeModal('ga-modal'); loadGenelAgenda(); 
        } 
    }

</script>
